workflows:
  ios-build:
    name: CraftStash iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: CodeMagic1

    environment:
      ios_signing:
        provisioning_profiles:
          - craftstash_appstore
          - craftstash_share_extension_appstore
      vars:
        XCODE_SCHEME: "CraftStash"
      xcode: 26.0

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Install iOS 26 Simulator
        script: |
          xcodebuild -downloadPlatform iOS

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcodebuild archive \
            -project CraftStash.xcodeproj \
            -scheme CraftStash \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/CraftStash.xcarchive \
            DEVELOPMENT_TEAM=9959PXX99M \
            -allowProvisioningUpdates

          xcodebuild -exportArchive \
            -archivePath build/CraftStash.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/CraftStash.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-test:
    name: CraftStash iOS Test (No signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: 26.0

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: List available simulators
        script: |
          xcrun simctl list devices available

      - name: Build for simulator
        script: |
          cd $CM_BUILD_DIR
          xcodebuild build \
            -project CraftStash.xcodeproj \
            -scheme CraftStash \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log
