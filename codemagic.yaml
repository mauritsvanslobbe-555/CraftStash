workflows:
  ios-build:
    name: CraftStash iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier:
          - com.craftstash.app
          - com.craftstash.app.share-extension
        provisioning_profiles:
          - profile: craftstash_appstore
            bundle_identifier: com.craftstash.app
          - profile: craftstash_share_extension_appstore
            bundle_identifier: com.craftstash.app.share-extension
      vars:
        XCODE_SCHEME: "CraftStash"
        APP_STORE_CONNECT_ISSUER_ID: "69a6de7f-99b2-47e3-e053-5b8c7c11a4d1"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "4K47D5CA5J"
      xcode: 16.2

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR
          xcodebuild archive \
            -project CraftStash.xcodeproj \
            -scheme CraftStash \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/CraftStash.xcarchive \
            DEVELOPMENT_TEAM=9959PXX99M \
            -allowProvisioningUpdates

          xcodebuild -exportArchive \
            -archivePath build/CraftStash.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa

    artifacts:
      - build/ipa/*.ipa
      - build/CraftStash.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - "External Testers"
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-test:
    name: CraftStash iOS Test (No signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate

      - name: List available simulators
        script: |
          xcrun simctl list devices available

      - name: Build for simulator
        script: |
          cd $CM_BUILD_DIR
          xcodebuild build \
            -project CraftStash.xcodeproj \
            -scheme CraftStash \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log
